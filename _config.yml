# GitHub Pages (Jekyll) configuratie.
# Exclude source-/intermediate-data zodat alleen bundle.bin gedeployd wordt.
# Deze bestanden blijven in de repo voor backup/dev, maar zijn niet publiek
# bereikbaar via jaardle.nl.
exclude:
  - events.en.json
  - events.nl.json
  - events.nl.partial.json
  - events.min.json
  - tools/
  - venvs/
  - "*.py"
  - "*.log"
  - LICENSE-DATA.md
