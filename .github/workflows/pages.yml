# Deploy naar GitHub Pages via Actions (vervangt de legacy Jekyll-pijplijn,
# die op 2026-07-02 vier deploys op rij in "deployment_queued" liet smoren).
# De site is puur statisch; Jekyll deed alleen excludes — die bootst de
# rsync-staging hieronder 1-op-1 na (zie het oude _config.yml).
name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Site stagen (zelfde excludes als het oude _config.yml)
        run: |
          mkdir -p /tmp/site
          rsync -a \
            --exclude='.git*' \
            --exclude='_config.yml' \
            --exclude='*.log' \
            --exclude='node_modules/' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='tests/' \
            --exclude='tools/' \
            --exclude='*.template.html' \
            ./ /tmp/site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/site
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # 20 min i.p.v. standaard 10: de deployment-wachtrij loopt soms
          # pas na >10 min leeg en dan smoort elke poging net te vroeg.
          timeout: 1200000
